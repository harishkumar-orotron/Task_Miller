<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Vibrant orange gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#E8400A"/>
    </linearGradient>

    <!-- Warm-toned drop shadow for the clipboard -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2" flood-color="#7A1E00" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Clipboard Board/Paper -->
  <rect x="14" y="18" width="36" height="36" rx="4" fill="white" filter="url(#shadow)"/>
  
  <!-- Clipboard Metal Clip at the Top -->
  <!-- Top part of the clip -->
  <rect x="23" y="12" width="18" height="8" rx="2" fill="#FFE1D1"/>
  <!-- Hanger hole -->
  <circle cx="32" cy="15" r="1.5" fill="#E8400A"/>
  <!-- Bottom darker piece of the clip -->
  <path d="M23,16 l18,0 l0,2 a2,2 0 0,1 -2,2 l-14,0 a-2,2 0 0,1 -2,-2 z" fill="#FF7B00"/>

  <!-- Task List (Checkboxes and Lines) -->
  <rect x="18" y="27" width="6" height="6" rx="1.5" fill="#FF8C00"/>
  <rect x="28" y="28.5" width="16" height="3" rx="1.5" fill="#E5E7EB"/>

  <rect x="18" y="37" width="6" height="6" rx="1.5" fill="#E5E7EB"/>
  <rect x="28" y="38.5" width="12" height="3" rx="1.5" fill="#E5E7EB"/>

  <rect x="18" y="47" width="6" height="6" rx="1.5" fill="#E5E7EB"/>
  <rect x="28" y="48.5" width="14" height="3" rx="1.5" fill="#E5E7EB"/>
</svg>
